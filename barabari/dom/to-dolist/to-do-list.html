<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
</head>
<body>
  
  <div class="container">
    <h1>To-Do-List</h1>
   
 <form  class="taskcontainer">
    <input type="text" placeholder="Enter your task" id="taskInput">
    
    <button id="addbtn" ><span>add task</span></button>
    </form> 
   <ul id="tasklist">
    
   </ul>
  <div class="task-status">
    <h4 >Total Tasks: <span id="tt">0</span></h4> 
  <h4>Completed Tasks: <span id="ct">0</span></h4>
  </div> 
  </div>
 
  <script src="to-do-list.js"></script>
</body>
</html>
