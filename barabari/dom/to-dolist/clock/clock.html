<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital clock</title>
    <link rel="stylesheet" href="clock.css">
</head>
<body>
  <div class="container">
    <div class="clock-card">
        <h1>Digital Clock - Indian Standard Time</h1>
        <div id="time" class="time">14:24:00</div>
        <div id="date" class="date">01/06/2026</div>
       <button id="toggle-btn">switch to 24-hour format</button>
    </div>
  </div> 
  <script src="clock.js"></script> 
</body>
</html>
